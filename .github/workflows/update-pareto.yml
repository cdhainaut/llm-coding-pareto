name: update-pareto

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy matplotlib plotly pillow
      - name: Update source data
        run: python scripts/update_data.py
      - name: Build Pareto assets
        run: python scripts/build_pareto.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data assets
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update coding Pareto data and assets"
            git push
          fi
